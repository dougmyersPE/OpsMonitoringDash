server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: all unknown paths return index.html for React Router.
    # no-cache ensures browsers always revalidate index.html so new JS
    # bundle filenames (content-hashed by Vite) are picked up immediately.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
